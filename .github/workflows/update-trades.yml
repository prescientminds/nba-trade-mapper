name: Update Trade Data

on:
  schedule:
    # Daily at 6am ET (11am UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Scrape today's trades
        run: npx tsx scripts/scrape-today.ts

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet public/data/trades/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/trades/
          git commit -m "chore: update trade data $(date +%Y-%m-%d)"
          git push
